name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache downloaded NuGet packages so future runs are faster.
      # The key changes only when a .csproj changes, otherwise the cache is reused.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      # Fail the build if any NuGet package (direct or transitive) has a known vulnerability.
      - name: Security scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -q "following vulnerable" vuln.txt; then
            echo "::error::Vulnerable NuGet packages detected — see the log above."
            exit 1
          fi
          echo "No vulnerable packages found."

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (with code coverage)
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      # Save the coverage report so you can download it from the run's "Artifacts" section.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: '**/coverage.cobertura.xml'
