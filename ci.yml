name: CI                       # "This pipeline is called CI."

on:                            # "Wake up WHEN..."
  push:                        #   "...code is pushed,"
  pull_request:                #   "...or a PR is opened."

jobs:                          # "Here's the work:"
  build-and-test:              #   "A job called build-and-test."
    runs-on: ubuntu-latest     #   "Run it on a clean Linux machine."
    steps:                     #   "Do these, in order:"
      - uses: actions/checkout@v4              # "1. Copy my code onto the machine."
      - uses: actions/setup-dotnet@v4          # "2. Install .NET 10."
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore                    # "3. Get packages."
      - run: dotnet build --no-restore ...     # "4. Compile."
      - run: dotnet test --no-build ...        # "5. Run tests."